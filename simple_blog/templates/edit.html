{% extends 'base.html' %}

{% block title %}Edit Post | Simple Blog{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Edit Blog Post</h1>
        <p>Update the title and content below.</p>

        <form method="post" class="blog-form">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ post.title }}">

            <label for="content">Content</label>
            <textarea id="content" name="content" rows="8">{{ post.content }}</textarea>

            <div class="form-actions">
                <a class="btn secondary" href="{{ url_for('index') }}">Cancel</a>
                <button type="submit" class="btn primary">Update</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
