{% extends 'base.html' %}

{% block title %}Create Post | Simple Blog{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Create Blog Post</h1>
        <p>Fill in the title and content to add a new post.</p>

        <form method="post" class="blog-form">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Enter post title">

            <label for="content">Content</label>
            <textarea id="content" name="content" rows="8" placeholder="Write your post content"></textarea>

            <div class="form-actions">
                <a class="btn secondary" href="{{ url_for('index') }}">Cancel</a>
                <button type="submit" class="btn primary">Publish</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
